name: Docker (ad-hoc)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to the short SHA)"
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          echo "value=${TAG:-$(git rev-parse --short HEAD)}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
